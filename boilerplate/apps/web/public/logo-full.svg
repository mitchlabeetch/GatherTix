<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" role="img" aria-label="GatherTix — because it's better to gather">
  <!--
    GatherTix Header Logo — Neo-Editorial flat design
    Compact ticket mark + Outfit bold wordmark + tagline.
    Ink (#111827) | Paper (#F4F4F0) | Cobalt (#2563EB) | Leaf Green (#059669)
  -->

  <!-- ── Ticket icon mark (120×120 path scaled to 64px tall) ──────────── -->
  <g transform="translate(0,8) scale(0.533)">
    <path
      d="M22 28 C22 23.582 25.582 20 30 20 L90 20 C94.418 20 98 23.582 98 28
         L98 46 C93.582 46 90 49.582 90 54 C90 58.418 93.582 62 98 62
         L98 92 C98 96.418 94.418 100 90 100 L30 100 C25.582 100 22 96.418 22 92
         L22 72 C26.418 72 30 68.418 30 64 C30 59.582 26.418 56 22 56 Z"
      fill="#111827"
    />
    <rect x="30" y="28" width="60" height="68" rx="2" fill="#F4F4F0"/>
    <circle cx="30" cy="54" r="3" fill="#F4F4F0"/>
    <circle cx="30" cy="62" r="3" fill="#F4F4F0"/>
    <circle cx="30" cy="70" r="3" fill="#F4F4F0"/>
    <circle cx="98" cy="54" r="3" fill="#F4F4F0"/>
    <circle cx="98" cy="62" r="3" fill="#F4F4F0"/>
    <circle cx="98" cy="70" r="3" fill="#F4F4F0"/>
    <line x1="30" y1="64" x2="90" y2="64" stroke="#111827" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text
      x="60" y="52"
      font-family="'Outfit', system-ui, sans-serif"
      font-size="28" font-weight="800"
      fill="#2563EB"
      text-anchor="middle" dominant-baseline="middle"
      letter-spacing="-1"
    >G</text>
    <rect x="38" y="73" width="20" height="4" rx="1" fill="#2563EB"/>
    <rect x="62" y="73" width="28" height="4" rx="1" fill="#9CA3AF"/>
    <rect x="38" y="82" width="44" height="4" rx="1" fill="#D1D5DB"/>
  </g>

  <!-- ── Wordmark ─────────────────────────────────────────────────────── -->
  <text
    x="64" y="48"
    font-family="'Outfit', system-ui, sans-serif"
    font-size="40" font-weight="800"
    fill="#111827"
    dominant-baseline="middle"
    letter-spacing="-1.5"
  >Gather<tspan fill="#059669">Tix</tspan></text>

  <!-- ── Tagline ──────────────────────────────────────────────────────── -->
  <text
    x="65" y="68"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="11" font-weight="500"
    fill="#4B5563"
    dominant-baseline="middle"
    letter-spacing="0.3"
  >because it&#x27;s better to gather.</text>
</svg>
