<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket - {{event.name}}</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    /* Ticket Container */
    .ticket {
      width: 320px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    
    /* Ticket Header */
    .ticket-header {
      background: linear-gradient(135deg, {{organization.primary_color|default:'#3B82F6'}} 0%, {{organization.secondary_color|default:'#8B5CF6'}} 100%);
      padding: 20px;
      text-align: center;
      color: white;
    }
    
    .org-logo {
      width: 60px;
      height: 60px;
      background: white;
      border-radius: 12px;
      padding: 8px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .org-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .org-name {
      font-size: 12px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Ticket Body */
    .ticket-body {
      padding: 24px 20px;
    }
    
    .event-name {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    
    .event-details {
      margin-bottom: 20px;
    }
    
    .detail-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .detail-icon {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      flex-shrink: 0;
      color: {{organization.primary_color|default:'#3B82F6'}};
    }
    
    .detail-content {
      flex: 1;
    }
    
    .detail-label {
      font-size: 11px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    
    .detail-value {
      font-size: 14px;
      color: #111827;
      font-weight: 500;
    }
    
    /* Attendee Section */
    .attendee-section {
      background: #F9FAFB;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    
    .attendee-label {
      font-size: 11px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .attendee-name {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }
    
    .ticket-type {
      font-size: 13px;
      color: {{organization.primary_color|default:'#3B82F6'}};
      font-weight: 600;
      margin-top: 4px;
    }
    
    /* QR Code Section */
    .qr-section {
      text-align: center;
      padding: 20px 0;
      border-top: 2px dashed #E5E7EB;
      border-bottom: 2px dashed #E5E7EB;
      margin-bottom: 16px;
    }
    
    .qr-code {
      width: 160px;
      height: 160px;
      margin: 0 auto 12px;
      background: white;
      padding: 8px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .qr-code img {
      width: 100%;
      height: 100%;
    }
    
    .qr-instruction {
      font-size: 12px;
      color: #6B7280;
    }
    
    /* Order Info */
    .order-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #6B7280;
    }
    
    .order-number {
      font-family: monospace;
      background: #F3F4F6;
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    /* Ticket Footer */
    .ticket-footer {
      background: #F9FAFB;
      padding: 16px 20px;
      text-align: center;
      font-size: 11px;
      color: #9CA3AF;
    }
    
    /* Cut Lines (for printing) */
    .cut-line {
      display: none;
    }
    
    @media print {
      body {
        background: white;
        padding: 0;
      }
      
      .ticket {
        box-shadow: none;
        page-break-inside: avoid;
      }
      
      .cut-line {
        display: block;
        border-top: 1px dashed #ccc;
        margin: 20px 0;
        position: relative;
      }
      
      .cut-line::before {
        content: '✂ Cut here';
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        padding: 0 10px;
        font-size: 10px;
        color: #999;
      }
    }
    
    /* Badge Format */
    .ticket-badge {
      display: none;
    }
    
    @media print and (width: 4in) {
      .ticket-standard {
        display: none;
      }
      
      .ticket-badge {
        display: block;
        width: 4in;
        height: 3in;
      }
    }
  </style>
</head>
<body>
  
  <!-- Standard Ticket Format -->
  <div class="ticket ticket-standard">
    <div class="ticket-header">
      <div class="org-logo">
        <img src="{{organization.logo_url}}" alt="{{organization.name}}">
      </div>
      <div class="org-name">{{organization.name}}</div>
    </div>
    
    <div class="ticket-body">
      <h1 class="event-name">{{event.name}}</h1>
      
      <div class="event-details">
        <div class="detail-row">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <div class="detail-content">
            <div class="detail-label">Date</div>
            <div class="detail-value">{{event.date}}</div>
          </div>
        </div>
        
        <div class="detail-row">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <div class="detail-content">
            <div class="detail-label">Time</div>
            <div class="detail-value">{{event.time}}</div>
          </div>
        </div>
        
        <div class="detail-row">
          <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <div class="detail-content">
            <div class="detail-label">Venue</div>
            <div class="detail-value">{{event.venue}}</div>
          </div>
        </div>
      </div>
      
      <div class="attendee-section">
        <div class="attendee-label">Attendee</div>
        <div class="attendee-name">{{attendee.name}}</div>
        <div class="ticket-type">{{attendee.ticket_type}}</div>
      </div>
      
      <div class="qr-section">
        <div class="qr-code">
          <img src="{{attendee.qr_code}}" alt="Ticket QR Code">
        </div>
        <p class="qr-instruction">Present this code at check-in</p>
      </div>
      
      <div class="order-info">
        <span>Order #{{order.number}}</span>
        <span class="order-number">{{ticket.id}}</span>
      </div>
    </div>
    
    <div class="ticket-footer">
      <p>Powered by OpenTickets &bull; {{organization.website}}</p>
    </div>
  </div>
  
  <!-- Print Cut Line -->
  <div class="cut-line"></div>
  
</body>
</html>
